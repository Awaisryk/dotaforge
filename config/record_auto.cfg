// ─── DotaForge Recording Autoexec ────────────────────
// This file is automatically executed when Dota 2 launches for replay recording
// Do not edit manually - managed by DotaForge

// =============================================================================
// CONSOLE & PERFORMANCE
// =============================================================================
con_enable "1"
con_notifytime "0"
fps_max "60"
mat_vsync "0"

// =============================================================================
// AUDIO
// =============================================================================
volume "0.7"
snd_mixahead "0.05"
snd_musicvolume "0"
snd_mute_losefocus "0"

// =============================================================================
// HUD (DISABLED FOR CLEAN RECORDING)
// =============================================================================
dota_sf_hud_actionpanel "0"
dota_sf_hud_chat "0"
dota_sf_hud_top "0"
dota_sf_hud_overlays "0"
dota_sf_hud_stat_branch "0"
dota_sf_hud_inventory "0"
dota_sf_hud_map "0"
dota_sf_hud_shop "0"
dota_hud_disable_damage_numbers "1"
dota_hud_disable_top_bar "1"
dota_hud_disable_healthbar "1"
dota_hud_disable_xp "1"

// =============================================================================
// SPECTATOR MODE (PLAYER PERSPECTIVE)
// =============================================================================
dota_spectator_mode "1"
dota_set_spectator_statue_mode "0"
spec_mode "4"
spec_player_by_accountid "0"  // Will be overridden by launch command
dota_camera_disable_zoom "1"
dota_camera_edgemove "0"
dota_camera_speed "3000"

// =============================================================================
// CONSOLE READY SIGNAL
// =============================================================================
echo "[DOTAFORGE] Autoexec loaded - ready to record"
echo "[DOTAFORGE] Waiting for replay to load..."
